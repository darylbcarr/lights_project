name: Build and Release

# Trigger: push a version tag like "v1.0.0"
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create a release and push version.json

    steps:
      # ── 1. Checkout full history (needed for git push below) ──────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Build with ESP-IDF ─────────────────────────────────────────────────
      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: esp32s3
          command: bash ci_build.sh

      # ── 3. Extract version from tag (strip leading "v") ───────────────────────
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      # ── 4. Create GitHub Release and upload .bin ──────────────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VERSION }}"
          generate_release_notes: true
          files: build/lights_project.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Update version.json and push to main ───────────────────────────────
      # Devices poll this file to discover new releases.
      - name: Update version.json
        run: |
          REPO="${{ github.repository }}"
          TAG="${GITHUB_REF_NAME}"
          VER="${{ env.VERSION }}"
          URL="https://github.com/${REPO}/releases/download/${TAG}/lights_project.bin"
          git fetch origin main
          git checkout origin/main
          printf '{\n  "version": "%s",\n  "url": "%s"\n}\n' "$VER" "$URL" > version.json
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "Update version.json to ${VER} [skip ci]"
          git push origin HEAD:main
